# Shopping Habit Tracker - Application Configuration
spring.application.name=shopping-habit-tracker
server.port=8081

# H2 in-memory database (zero-config for dev/testing)
spring.datasource.url=jdbc:h2:mem:habitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 console (accessible at http://localhost:8081/h2-console in dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.com.habittracker=INFO
logging.level.org.springframework.web=WARN
